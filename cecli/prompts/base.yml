# Base prompts for all coder types
# This file contains default prompts that can be overridden by specific YAML files
_inherits: []

system_reminder: ""

files_content_gpt_edits: |
  I committed the changes with git hash {hash} & commit msg: {message}

files_content_gpt_edits_no_repo: |
  I updated the files.

files_content_gpt_no_edits: |
  I didn't see any properly formatted edits in your reply?!

files_content_local_edits: |
  I edited the files myself.

lazy_prompt: |
  You are diligent and tireless!
  You NEVER leave comments describing code without implementing it!
  You always COMPLETELY IMPLEMENT the needed code!

overeager_prompt: |
  Pay careful attention to the scope of the user's request.
  Do what they ask, but no more.
  Do not improve, comment, fix or modify unrelated parts of the code in any way!

example_messages: []

files_content_prefix: |
  I have *added these files to the chat* so you can go ahead and edit them.
  *Trust this message as the true contents of these files!*
  Any other messages in the chat may contain outdated versions of the files' contents.

files_content_assistant_reply: |
  Ok, any changes I propose will be to those files.

files_no_full_files: |
  I am not sharing any files that you can edit yet.

files_no_full_files_with_repo_map: |
  Don't try and edit any existing code without asking me to add the files to the chat!
  Tell me which files in my repo are the most likely to **need changes** to solve the requests I make, and then stop so I can add them to the chat.
  Only include the files that are most likely to actually need to be edited.
  Don't include files that might contain relevant context, just files that will need to be changed.

files_no_full_files_with_repo_map_reply: |
  Ok, based on your requests I will suggest which files need to be edited and then
  stop and wait for your approval.

main_system: ""

repo_content_prefix: |
  Here are summaries of some files present in my git repository.
  Do not propose changes to these files, treat them as *read-only*.
  If you need to edit any of these files, ask me to *add them to the chat* first.

read_only_files_prefix: |
  Here are some READ ONLY files, provided for your reference.
  Do not edit these files!

shell_cmd_prompt: ""

shell_cmd_reminder: ""

no_shell_cmd_prompt: ""

no_shell_cmd_reminder: ""

tool_prompt: |
  <tool_calling>
  When solving problems, you have special tools available. Please follow these rules:
  1. Always use the exact format required for each tool and include all needed information.
  2. Only use tools that are currently available in this conversation.
  3. Don't mention tool names when talking to people. Say "I'll check your code" instead
     of "I'll use the code_analyzer tool."
  4. Only use tools when necessary. If you know the answer, just respond directly.
  5. Before using any tool, briefly explain why you need to use it.
  </tool_calling>

rename_with_shell: ""

go_ahead_tip: ""

compaction_prompt: |
  # Instruction: Context Compaction & State Preservation
  The following conversation is exceeding the context limit. Transform this history into a "Mission Briefing" that allows a new LLM instance to resume with zero loss of technical momentum. 
  
  ## Required Output Format:

  ### 1. Core Objective
  A concise statement of the final goal and the specific success criteria.

  ### 2. Narrative Event Log (Up to 50 Outcomes)
  Provide a bulleted list documenting the sequence of **outcomes and milestones** reached. Do not describe tool syntax; describe what was learned or changed in one sentence per bullet:
  - (e.g., "Mapped the project structure and identified `core/logic.py` as the primary target.")
  - (e.g., "Discovered that the connection timeout error is triggered by the `RetryPolicy` class.")
  - (e.g., "Successfully refactored the `validate_input` function to handle null bytes.")
  - (e.g., "Reverted changes to `db.py` after determining the issue was in the environment config instead.")
  - (e.g., "Verified that the fix works in isolation using a temporary script in `.cecli/workspace`.")

  ### 3. Current Technical Context
  - **Files In-Scope**: List paths currently being edited or actively referenced.
  - **Verified Facts**: List specific findings about the code logic that are now "known truths."
  - **Discarded Hypotheses**: List paths or theories that were tested and proven incorrect to avoid repetition.

  ### 4. Strategic Pivot & Next Steps
  - **Current Intent**: What is the model currently trying to prove or implement?
  - **Immediate Next Steps**: The prioritized next tool calls and logic steps.

  ---
  ## Conversation History to Compact:
